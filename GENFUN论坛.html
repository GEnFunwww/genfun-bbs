<style>
/* ========== CSS Variables ========== */
:root {
  /* Dark Theme (default) */
  --bg: #0d1117;
  --bg-secondary: #161b22;
  --bg-card: #1c2128;
  --bg-hover: #21262d;
  --bg-input: #0d1117;
  --header-bg: rgba(13, 17, 23, 0.85);
  --border: #30363d;
  --border-light: #21262d;
  --text: #e6edf3;
  --text-secondary: #8b949e;
  --text-muted: #6e7681;
  --accent: #3b82f6;
  --accent-hover: #60a5fa;
  --accent-light: rgba(59, 130, 246, 0.15);
  --accent-glow: rgba(59, 130, 246, 0.3);
  --accent-alt: #06b6d4;
  --success: #3fb950;
  --success-bg: rgba(63, 185, 80, 0.15);
  --danger: #f85149;
  --danger-bg: rgba(248, 81, 73, 0.15);
  --warning: #d29922;
  --warning-bg: rgba(210, 153, 34, 0.15);
  --info: #58a6ff;
  --radius: 12px;
  --radius-sm: 8px;
  --radius-xs: 4px;
  --shadow: 0 1px 3px rgba(0,0,0,0.3), 0 1px 2px rgba(0,0,0,0.4);
  --shadow-lg: 0 8px 32px rgba(0,0,0,0.5);
  --transition: 0.2s cubic-bezier(0.4, 0, 0.2, 1);
  --font-mono: 'SF Mono', 'Cascadia Code', 'Fira Code', 'Consolas', monospace;
}

/* ========== Light Theme ========== */
[data-theme="light"] {
  --bg: #ffffff;
  --bg-secondary: #f6f8fa;
  --bg-card: #ffffff;
  --bg-hover: #f0f2f5;
  --bg-input: #ffffff;
  --header-bg: rgba(255, 255, 255, 0.85);
  --border: #d0d7de;
  --border-light: #d8dee4;
  --text: #1f2328;
  --text-secondary: #656d76;
  --text-muted: #8c959f;
  --accent: #2563eb;
  --accent-hover: #1d4ed8;
  --accent-light: rgba(37, 99, 235, 0.1);
  --accent-glow: rgba(37, 99, 235, 0.25);
  --accent-alt: #0891b2;
  --success: #1a7f37;
  --success-bg: rgba(26, 127, 55, 0.1);
  --danger: #cf222e;
  --danger-bg: rgba(207, 34, 46, 0.1);
  --warning: #9a6700;
  --warning-bg: rgba(154, 103, 0, 0.1);
  --info: #0969da;
  --shadow: 0 1px 3px rgba(31,35,40,0.12), 0 1px 2px rgba(31,35,40,0.06);
  --shadow-lg: 0 8px 24px rgba(140,149,159,0.2);
}

/* ========== Reset & Base ========== */
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

html { scroll-behavior: smooth; }

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', 'Helvetica Neue', sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.6;
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

a { color: var(--accent); text-decoration: none; }
a:hover { color: var(--accent-hover); }

/* ========== Scrollbar ========== */
::-webkit-scrollbar { width: 8px; height: 8px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }

/* ========== App Container ========== */
#app { max-width: 960px; margin: 0 auto; padding: 0 20px; min-height: 100vh; display: flex; flex-direction: column; }

/* ========== Header ========== */
.header {
  position: sticky; top: 0; z-index: 100;
  background: var(--header-bg); backdrop-filter: blur(16px);
  border-bottom: 1px solid var(--border);
  padding: 0 20px; margin: 0 -20px;
  display: flex; align-items: center; justify-content: space-between;
  height: 60px;
}
.header-left { display: flex; align-items: center; gap: 24px; }
.logo {
  font-size: 20px; font-weight: 800; color: var(--text);
  display: flex; align-items: center; gap: 8px; cursor: pointer;
  user-select: none; white-space: nowrap;
}
.logo-icon {
  width: 36px; height: 36px; background: linear-gradient(135deg, var(--accent), var(--accent-alt));
  border-radius: var(--radius-sm); display: flex; align-items: center; justify-content: center;
  font-size: 18px; color: #fff; font-weight: 900;
}
.nav { display: flex; gap: 4px; }
.nav-btn {
  padding: 6px 16px; border-radius: 20px; border: none; background: transparent;
  color: var(--text-secondary); font-size: 14px; cursor: pointer;
  transition: var(--transition); font-family: inherit; white-space: nowrap;
}
.nav-btn:hover { color: var(--text); background: var(--bg-hover); }
.nav-btn.active { color: #fff; background: var(--accent); font-weight: 600; }

.header-right { display: flex; align-items: center; gap: 12px; }
.user-btn {
  display: flex; align-items: center; gap: 8px; padding: 4px 12px 4px 4px;
  border-radius: 24px; border: 1px solid var(--border); background: var(--bg-secondary);
  color: var(--text); cursor: pointer; transition: var(--transition);
  font-family: inherit; font-size: 14px;
}
.user-btn:hover { border-color: var(--accent); background: var(--bg-hover); }
.user-avatar {
  width: 30px; height: 30px; border-radius: 50%;
  background: linear-gradient(135deg, var(--accent), var(--accent-alt));
  display: flex; align-items: center; justify-content: center;
  color: #fff; font-size: 12px; font-weight: 700; flex-shrink: 0;
}
.admin-badge {
  background: linear-gradient(135deg, #f59e0b, #ef4444); color: #fff;
  font-size: 10px; padding: 2px 8px; border-radius: 10px; font-weight: 700;
  margin-left: 4px; white-space: nowrap;
}
.login-link {
  padding: 6px 18px; border-radius: 20px; border: 1px solid var(--accent);
  background: transparent; color: var(--accent); font-size: 14px; cursor: pointer;
  transition: var(--transition); font-family: inherit; white-space: nowrap;
}
.login-link:hover { background: var(--accent); color: #fff; }

/* Theme toggle */
.theme-toggle {
  width: 34px; height: 34px; border-radius: 50%; border: 1px solid var(--border);
  background: var(--bg-secondary); color: var(--text-secondary); cursor: pointer;
  font-size: 16px; display: flex; align-items: center; justify-content: center;
  transition: var(--transition); flex-shrink: 0;
}
.theme-toggle:hover { border-color: var(--accent); color: var(--accent); background: var(--bg-hover); }

/* ========== Main Content ========== */
.main { flex: 1; padding: 24px 0; }
.page { display: none; }
.page.active { display: block; }

/* ========== Category Tabs ========== */
.category-tabs {
  display: flex; gap: 6px; margin-bottom: 20px; flex-wrap: wrap;
  padding: 4px; background: var(--bg-secondary); border-radius: var(--radius);
}
.cat-tab {
  padding: 6px 16px; border-radius: 20px; border: none; background: transparent;
  color: var(--text-secondary); font-size: 13px; cursor: pointer;
  transition: var(--transition); font-family: inherit;
}
.cat-tab:hover { color: var(--text); }
.cat-tab.active { background: var(--accent); color: #fff; font-weight: 600; }

/* ========== Search ========== */
.search-bar { display: flex; gap: 8px; margin-bottom: 20px; }
.search-input {
  flex: 1; padding: 10px 16px; border-radius: var(--radius);
  border: 1px solid var(--border); background: var(--bg-input);
  color: var(--text); font-size: 14px; font-family: inherit;
  outline: none; transition: var(--transition);
}
.search-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-light); }
.search-input::placeholder { color: var(--text-muted); }

/* ========== Post Cards ========== */
.post-list { display: flex; flex-direction: column; gap: 12px; }
.post-card {
  background: var(--bg-card); border: 1px solid var(--border-light);
  border-radius: var(--radius); padding: 20px; cursor: pointer;
  transition: var(--transition); position: relative;
}
.post-card:hover { border-color: var(--accent); transform: translateY(-1px); box-shadow: var(--shadow-lg); }
.post-card-header { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; margin-bottom: 8px; }
.post-card-title { font-size: 17px; font-weight: 600; color: var(--text); line-height: 1.4; flex: 1; }
.post-card-category {
  font-size: 11px; padding: 2px 10px; border-radius: 12px;
  background: var(--accent-light); color: var(--accent);
  white-space: nowrap; font-weight: 600;
}
.post-card-preview { color: var(--text-secondary); font-size: 14px; line-height: 1.6; margin-bottom: 12px; }
.post-card-meta {
  display: flex; align-items: center; gap: 16px; flex-wrap: wrap;
  font-size: 12px; color: var(--text-muted);
}
.post-card-meta span { display: flex; align-items: center; gap: 4px; }
.post-card-author { color: var(--text-secondary); font-weight: 500; }
.post-card-tag { display: inline-flex; align-items: center; gap: 3px; }

/* ========== Post Detail ========== */
.post-detail { background: var(--bg-card); border: 1px solid var(--border-light); border-radius: var(--radius); padding: 28px; margin-bottom: 24px; }
.post-detail-header { margin-bottom: 20px; }
.post-detail-title { font-size: 24px; font-weight: 700; margin-bottom: 12px; line-height: 1.3; }
.post-detail-meta {
  display: flex; align-items: center; gap: 16px; flex-wrap: wrap;
  font-size: 13px; color: var(--text-muted); padding-bottom: 20px;
  border-bottom: 1px solid var(--border-light);
}
.post-detail-content {
  padding: 20px 0; font-size: 15px; line-height: 1.8; white-space: pre-wrap; word-break: break-word;
}
.post-attachments { margin-top: 16px; padding-top: 16px; border-top: 1px solid var(--border-light); }
.post-attachments h4 { font-size: 13px; color: var(--text-secondary); margin-bottom: 10px; }
.attach-item {
  display: flex; align-items: center; gap: 10px; padding: 10px 14px;
  background: var(--bg-secondary); border-radius: var(--radius-sm);
  margin-bottom: 6px; font-size: 13px;
}
.attach-item a { color: var(--info); word-break: break-all; }
.attach-size { color: var(--text-muted); font-size: 12px; white-space: nowrap; }

/* ========== Replies ========== */
.replies-section { margin-top: 8px; }
.replies-title { font-size: 16px; font-weight: 600; margin-bottom: 16px; color: var(--text); }
.reply-card {
  background: var(--bg-card); border: 1px solid var(--border-light);
  border-radius: var(--radius-sm); padding: 16px; margin-bottom: 10px;
}
.reply-header { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
.reply-author { font-weight: 600; font-size: 13px; }
.reply-time { font-size: 12px; color: var(--text-muted); }
.reply-content { font-size: 14px; line-height: 1.7; white-space: pre-wrap; word-break: break-word; }

/* ========== Reply Form ========== */
.reply-form { margin-top: 20px; display: flex; flex-direction: column; gap: 12px; }
.reply-form textarea {
  width: 100%; min-height: 100px; padding: 14px; border-radius: var(--radius);
  border: 1px solid var(--border); background: var(--bg-input); color: var(--text);
  font-size: 14px; font-family: inherit; resize: vertical; outline: none; transition: var(--transition);
}
.reply-form textarea:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-light); }

/* ========== Forms ========== */
.form-container {
  max-width: 440px; margin: 40px auto; background: var(--bg-card);
  border: 1px solid var(--border-light); border-radius: var(--radius);
  padding: 32px;
}
.form-title { font-size: 22px; font-weight: 700; margin-bottom: 24px; text-align: center; }
.form-group { margin-bottom: 18px; }
.form-label { display: block; font-size: 13px; color: var(--text-secondary); margin-bottom: 6px; font-weight: 500; }
.form-input, .form-select, .form-textarea {
  width: 100%; padding: 10px 14px; border-radius: var(--radius-sm);
  border: 1px solid var(--border); background: var(--bg-input); color: var(--text);
  font-size: 14px; font-family: inherit; outline: none; transition: var(--transition);
}
.form-input:focus, .form-select:focus, .form-textarea:focus {
  border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-light);
}
.form-textarea { min-height: 160px; resize: vertical; }
.form-hint { font-size: 12px; color: var(--text-muted); margin-top: 4px; }

/* Toggle switch for email/phone */
.login-type-toggle {
  display: flex; background: var(--bg-secondary); border-radius: var(--radius);
  padding: 3px; margin-bottom: 20px;
}
.toggle-option {
  flex: 1; padding: 8px; text-align: center; border-radius: var(--radius-sm);
  border: none; background: transparent; color: var(--text-secondary);
  font-size: 14px; cursor: pointer; transition: var(--transition); font-family: inherit;
}
.toggle-option.active { background: var(--accent); color: #fff; font-weight: 600; }
.form-footer { text-align: center; margin-top: 16px; font-size: 13px; color: var(--text-secondary); }
.form-footer a { cursor: pointer; font-weight: 600; }

.code-input-row { display: flex; gap: 10px; }
.code-input-row .code-input { flex: 1; }
.code-hint { margin-top: 8px; padding: 8px 14px; background: var(--accent-light); border: 1px solid var(--accent); border-radius: var(--radius-xs); font-size: 13px; color: var(--accent); font-weight: 600; text-align: center; }
.btn-code {
  flex-shrink: 0; padding: 0 16px; height: 44px; border: none; border-radius: var(--radius-sm);
  background: var(--accent); color: #fff; font-size: 13px; cursor: pointer; white-space: nowrap;
  transition: var(--transition);
}
.btn-code:hover { background: var(--accent-hover); }
.btn-code:disabled { background: var(--border); color: var(--text-muted); cursor: not-allowed; }

/* ========== New Post Form ========== */
.new-post-form { max-width: 100%; }
.new-post-form .form-group { margin-bottom: 20px; }

/* ========== File Upload ========== */
.upload-zone {
  border: 2px dashed var(--border); border-radius: var(--radius);
  padding: 32px; text-align: center; cursor: pointer; transition: var(--transition);
  background: var(--bg-secondary); position: relative;
}
.upload-zone:hover, .upload-zone.drag-over {
  border-color: var(--accent); background: var(--accent-light);
}
.upload-icon { font-size: 36px; margin-bottom: 8px; opacity: 0.6; }
.upload-text { font-size: 14px; color: var(--text-secondary); }
.upload-hint { font-size: 12px; color: var(--text-muted); margin-top: 4px; }
.upload-zone input[type="file"] { display: none; }

.file-list { margin-top: 12px; display: flex; flex-direction: column; gap: 8px; }
.file-item {
  display: flex; align-items: center; gap: 12px; padding: 10px 14px;
  background: var(--bg-secondary); border-radius: var(--radius-sm);
  border: 1px solid var(--border-light);
}
.file-item-info { flex: 1; min-width: 0; }
.file-item-name { font-size: 13px; font-weight: 500; word-break: break-all; }
.file-item-meta { font-size: 12px; color: var(--text-muted); }
.file-item-remove {
  width: 28px; height: 28px; border-radius: 50%; border: none;
  background: var(--danger-bg); color: var(--danger); cursor: pointer;
  font-size: 16px; display: flex; align-items: center; justify-content: center;
  transition: var(--transition); flex-shrink: 0;
}
.file-item-remove:hover { background: var(--danger); color: #fff; }

.upload-progress {
  margin-top: 12px; background: var(--bg-secondary);
  border-radius: var(--radius-sm); padding: 12px; display: none;
}
.upload-progress.show { display: block; }
.progress-bar-bg {
  height: 6px; background: var(--border); border-radius: 3px;
  overflow: hidden; margin-bottom: 6px;
}
.progress-bar-fill {
  height: 100%; background: linear-gradient(90deg, var(--accent), var(--accent-alt));
  border-radius: 3px; transition: width 0.3s; width: 0%;
}
.progress-info { display: flex; justify-content: space-between; font-size: 12px; color: var(--text-muted); }

/* ========== Buttons ========== */
.btn {
  padding: 10px 24px; border-radius: var(--radius-sm); border: none;
  font-size: 14px; font-weight: 600; cursor: pointer; font-family: inherit;
  transition: var(--transition); display: inline-flex; align-items: center; gap: 6px;
}
.btn-primary { background: var(--accent); color: #fff; }
.btn-primary:hover { background: var(--accent-hover); box-shadow: 0 4px 12px var(--accent-glow); }
.btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
.btn-block { width: 100%; justify-content: center; }
.btn-sm { padding: 6px 14px; font-size: 13px; }
.btn-danger { background: var(--danger-bg); color: var(--danger); }
.btn-danger:hover { background: var(--danger); color: #fff; }
.btn-ghost { background: transparent; color: var(--text-secondary); border: 1px solid var(--border); }
.btn-ghost:hover { border-color: var(--accent); color: var(--accent); }

/* ========== Toast ========== */
#toast-container { position: fixed; top: 80px; right: 20px; z-index: 9999; display: flex; flex-direction: column; gap: 10px; }
.toast {
  padding: 12px 20px; border-radius: var(--radius-sm); font-size: 14px;
  box-shadow: var(--shadow-lg); animation: slideIn 0.3s ease; max-width: 380px;
  display: flex; align-items: center; gap: 8px;
}
.toast-success { background: var(--success-bg); color: var(--success); border: 1px solid rgba(63,185,80,0.3); }
.toast-error { background: var(--danger-bg); color: var(--danger); border: 1px solid rgba(248,81,73,0.3); }
.toast-info { background: var(--accent-light); color: var(--accent); border: 1px solid var(--accent-light); }
@keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

/* ========== States ========== */
.empty-state { text-align: center; padding: 60px 20px; color: var(--text-muted); }
.empty-state-icon { font-size: 48px; margin-bottom: 12px; opacity: 0.4; }
.empty-state-text { font-size: 15px; }
.loading { text-align: center; padding: 40px; color: var(--text-muted); }
.spinner {
  width: 32px; height: 32px; border: 3px solid var(--border);
  border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite;
  margin: 0 auto 8px;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ========== Pagination ========== */
.pagination { display: flex; justify-content: center; align-items: center; gap: 8px; margin-top: 24px; }
.page-btn {
  padding: 6px 14px; border-radius: var(--radius-sm); border: 1px solid var(--border);
  background: var(--bg-card); color: var(--text); font-size: 13px; cursor: pointer;
  transition: var(--transition); font-family: inherit;
}
.page-btn:hover:not(:disabled) { border-color: var(--accent); }
.page-btn:disabled { opacity: 0.4; cursor: not-allowed; }
.page-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }
.page-info { font-size: 13px; color: var(--text-muted); }

/* ========== Back Button ========== */
.back-btn {
  display: inline-flex; align-items: center; gap: 6px; padding: 6px 12px;
  border-radius: var(--radius-sm); border: 1px solid var(--border);
  background: var(--bg-card); color: var(--text-secondary); font-size: 13px;
  cursor: pointer; margin-bottom: 20px; transition: var(--transition); font-family: inherit;
}
.back-btn:hover { border-color: var(--accent); color: var(--accent); }

/* ========== Floating Action Button ========== */
.fab {
  position: fixed; bottom: 32px; right: 32px; z-index: 999;
  width: 56px; height: 56px; border-radius: 50%; border: none;
  background: linear-gradient(135deg, var(--accent), var(--accent-alt));
  color: #fff; font-size: 28px; cursor: pointer; box-shadow: 0 4px 16px var(--accent-glow);
  display: flex; align-items: center; justify-content: center;
  transition: transform 0.2s, box-shadow 0.2s; line-height: 1;
}
.fab:hover { transform: scale(1.1); box-shadow: 0 6px 24px var(--accent-glow); }
.fab:active { transform: scale(0.95); }
.fab.hidden { display: none; }

.admin-nav-btn { border-color: #f59e0b !important; color: #f59e0b !important; }
.admin-badge {
  font-size: 10px; padding: 2px 8px; border-radius: 8px; background: rgba(245,158,11,0.2); color: #f59e0b;
  border: 1px solid rgba(245,158,11,0.3); font-weight: 700; white-space: nowrap; margin-left: 6px;
}

/* ========== Theme Picker ========== */
.theme-picker-btn { 
  cursor: pointer; width: 36px; height: 36px; border-radius: 50%; border: 2px solid var(--border);
  background: transparent; display: flex; align-items: center; justify-content: center; font-size: 16px;
  transition: var(--transition); position: relative;
}
.theme-picker-btn:hover { border-color: var(--accent); }
.theme-popup {
  position: absolute; top: 56px; right: 52px; background: var(--bg-card); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 20px; z-index: 100; min-width: 260px;
  box-shadow: var(--shadow-lg); display: none;
}
.theme-popup.show { display: block; }
.theme-popup-title { font-size: 14px; font-weight: 600; margin-bottom: 14px; color: var(--text); }
.theme-presets { display: flex; gap: 8px; margin-bottom: 14px; flex-wrap: wrap; }
.theme-preset {
  width: 32px; height: 32px; border-radius: 50%; border: 2px solid transparent; cursor: pointer;
  transition: var(--transition); position: relative;
}
.theme-preset:hover { transform: scale(1.15); }
.theme-preset.active { border-color: var(--text); box-shadow: 0 0 8px var(--accent-glow); }
.theme-preset.blue { background: linear-gradient(135deg, #3b82f6, #06b6d4); }
.theme-preset.green { background: linear-gradient(135deg, #10b981, #34d399); }
.theme-preset.orange { background: linear-gradient(135deg, #f59e0b, #ef4444); }
.theme-preset.purple { background: linear-gradient(135deg, #8b5cf6, #a78bfa); }
.theme-preset.pink { background: linear-gradient(135deg, #ec4899, #f472b6); }
.theme-preset.teal { background: linear-gradient(135deg, #0d9488, #14b8a6); }
.theme-color-row { display: flex; align-items: center; gap: 10px; margin-top: 12px; }

    <!-- User Lists Page (following/fans) -->
    <section class="page" id="page-userlist">
      <div class="container">
        <button class="back-btn" onclick="App.navigate('profile', {userId: App.viewingUserId})">鈫?杩斿洖鐢ㄦ埛涓婚〉</button>
        <h2 class="section-title" id="userlistTitle">鍒楄〃</h2>
        <div class="user-list" id="userListContent">
          <div class="loading">鍔犺浇涓?..</div>
        </div>
      </div>
    </section>

  </main>
</div>

<!-- Floating Action Button -->
<button class="fab hidden" id="fabNewPost" onclick="App.navigate('new')" title="鍙戝竷鏂板笘">+</button>

<!-- Toast Container -->
<div id="toast-container"></div>

<script>
/* ================================================================
   GENFUN璁哄潧 - 鍓嶇搴旂敤
   ================================================================ */

const App = {
  // ---- 鐘舵€?----
  token: localStorage.getItem('genfun_token') || '',
  user: JSON.parse(localStorage.getItem('genfun_user') || 'null'),
  theme: localStorage.getItem('genfun_theme') || 'dark',
  themePreset: localStorage.getItem('genfun_theme_preset') || 'blue',
  customAccent: localStorage.getItem('genfun_custom_accent') || '#3b82f6',
  customAccentAlt: localStorage.getItem('genfun_custom_accent_alt') || '#06b6d4',
  currentPage: 'home',
  viewingUserId: null,
  adminTab: 'dashboard',
  selectedPosts: new Set(),
  currentCategory: '鍏ㄩ儴',
  currentPostId: null,
  currentPostPage: 1,
  isRegisterMode: false,
  loginType: 'email',
  codeTimer: null,
  codeCountdown: 0,
  selectedFiles: [],
  uploadedFiles: [],

  // ---- 鍒濆鍖?----
  init() {
    this.token = localStorage.getItem('genfun_token') || '';
    this.user = JSON.parse(localStorage.getItem('genfun_user') || 'null');
    this.initTheme();
    this.updateAuthUI();
    this.bindEvents();
    this.loadPosts();
    // 鑷姩閲嶈浇浠ュ埛鏂版暟鎹紙瑙ｅ喅鏃х紦瀛樻棤role瀛楁闂锛?    if (this.token && (!this.user || !this.user.role)) {
      this.refreshUser();
    }
  },

  async refreshUser() {
    try {
      const data = await this.api('GET', '/api/me');
      this.user = data.user;
      localStorage.setItem('genfun_user', JSON.stringify(this.user));
      this.updateAuthUI();
    } catch (e) { /* token 杩囨湡鍒欏拷鐣?*/ }
  },

  // ---- 瀵艰埅 ----
  navigate(page, data) {
    this.currentPage = page;
    if (data && data.postId) this.currentPostId = data.postId;

    // 鏇存柊椤甸潰鏄剧ず
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    const pageEl = document.getElementById('page-' + page);
    if (pageEl) pageEl.classList.add('active');

    // 鏇存柊瀵艰埅鎸夐挳
    document.querySelectorAll('.nav-btn').forEach(b => {
      b.classList.toggle('active', b.dataset.page === page);
    });

    // 椤甸潰閫昏緫
    if (page === 'home') { this.currentPostPage = 1; this.loadPosts(); }
    if (page === 'post') { this.loadPostDetail(); }
    if (page === 'new') { if (!this.user) { this.navigate('login'); this.toast('璇峰厛鐧诲綍', 'info'); } }
    if (page === 'login') { this.resetAuthForm(); }
    if (page === 'admin') { if (!this.user || this.user.role !== 'admin') { this.navigate('home'); return; } this.switchAdminTab('dashboard'); }
    if (page === 'profile') { if (data && data.userId) { this.viewingUserId = data.userId; this.loadUserProfile(data.userId); } }
    if (page === 'userlist') { if (data && data.type) { this.loadUserList(data.type, data.userId); } }

    window.scrollTo({ top: 0, behavior: 'smooth' });
    this.updateFab();
  },

  // ---- 涓婚鍒囨崲 ----
  initTheme() {
    document.documentElement.setAttribute('data-theme', this.theme);
    this.updateThemeIcon();
    this.applyThemeColors();
  },

  toggleTheme() {
    this.theme = this.theme === 'dark' ? 'light' : 'dark';
    localStorage.setItem('genfun_theme', this.theme);
    document.documentElement.setAttribute('data-theme', this.theme);
    this.updateThemeIcon();
  },

  updateThemeIcon() {
    const btn = document.getElementById('themeToggle');
    if (btn) btn.textContent = this.theme === 'dark' ? '鈽€' : '馃寵';
  },

  // ======== 閰嶈壊鏂规 ========
  PRESETS: {
    blue: ['#3b82f6', '#06b6d4'],
    green: ['#10b981', '#34d399'],
    orange: ['#f59e0b', '#ef4444'],
    purple: ['#8b5cf6', '#a78bfa'],
    pink: ['#ec4899', '#f472b6'],
    teal: ['#0d9488', '#14b8a6'],
  },

  applyThemeColors() {
    const accent = this.themePreset === 'custom' ? this.customAccent : (this.PRESETS[this.themePreset] || this.PRESETS.blue)[0];
    const accentAlt = this.themePreset === 'custom' ? this.customAccentAlt : (this.PRESETS[this.themePreset] || this.PRESETS.blue)[1];
    const root = document.documentElement;
    root.style.setProperty('--accent', accent);
    root.style.setProperty('--accent-hover', accent + 'cc');
    root.style.setProperty('--accent-light', accent + '26');
    root.style.setProperty('--accent-glow', accent + '4d');
    root.style.setProperty('--accent-alt', accentAlt);
    // 鏇存柊棰勮鎸囩ず
    document.querySelectorAll('.theme-preset').forEach(el => {
      el.classList.toggle('active', el.dataset.theme === this.themePreset);
    });
    document.getElementById('customAccent').value = accent;
    document.getElementById('customAccentAlt').value = accentAlt;
  },

  setThemePreset(preset) {
    this.themePreset = preset;
    localStorage.setItem('genfun_theme_preset', preset);
    this.applyThemeColors();
  },

  previewCustom() {
    const accent = document.getElementById('customAccent').value;
    const accentAlt = document.getElementById('customAccentAlt').value;
    const root = document.documentElement;
    root.style.setProperty('--accent', accent);
    root.style.setProperty('--accent-alt', accentAlt);
  },

  applyCustomTheme() {
    this.themePreset = 'custom';
    this.customAccent = document.getElementById('customAccent').value;
    this.customAccentAlt = document.getElementById('customAccentAlt').value;
    localStorage.setItem('genfun_theme_preset', 'custom');
    localStorage.setItem('genfun_custom_accent', this.customAccent);
    localStorage.setItem('genfun_custom_accent_alt', this.customAccentAlt);
    this.applyThemeColors();
    this.toggleThemePopup(); // close
    this.toast('宸插簲鐢ㄨ嚜瀹氶厤鑹?, 'success');
  },

  toggleThemePopup() {
    const popup = document.getElementById('themePopup');
    popup.classList.toggle('show');
  },

  updateFab() {
    const fab = document.getElementById('fabNewPost');
    if (!fab) return;
    if (this.user && this.currentPage === 'home') {
      fab.classList.remove('hidden');
    } else if (this.currentPage !== 'home') {
      fab.classList.add('hidden');
    } else {
      fab.classList.add('hidden');
    }
  },

  // ---- 浜嬩欢缁戝畾 ----
  bindEvents() {
    // 鍒嗙被鍒囨崲
    document.getElementById('categoryTabs').addEventListener('click', (e) => {
      if (e.target.classList.contains('cat-tab')) {
        document.querySelectorAll('.cat-tab').forEach(b => b.classList.remove('active'));
        e.target.classList.add('active');
        this.currentCategory = e.target.dataset.cat;
        this.currentPostPage = 1;
        this.loadPosts();
      }
    });

    // 鐧诲綍鏂瑰紡鍒囨崲
    document.getElementById('loginTypeToggle').addEventListener('click', (e) => {
      if (e.target.classList.contains('toggle-option')) {
        document.querySelectorAll('#loginTypeToggle .toggle-option').forEach(b => b.classList.remove('active'));
        e.target.classList.add('active');
        this.loginType = e.target.dataset.type;
        this.updateLoginTypeUI();
      }
    });

    // 鎷栨嫿涓婁紶
    const uploadZone = document.getElementById('uploadZone');
    if (uploadZone) {
      ['dragenter', 'dragover'].forEach(ev => {
        uploadZone.addEventListener(ev, (e) => { e.preventDefault(); uploadZone.classList.add('drag-over'); });
      });
      ['dragleave', 'drop'].forEach(ev => {
        uploadZone.addEventListener(ev, (e) => { e.preventDefault(); uploadZone.classList.remove('drag-over'); });
      });
      uploadZone.addEventListener('drop', (e) => {
        if (e.dataTransfer.files.length) this.addFiles(e.dataTransfer.files);
      });
    }

    // 绠＄悊鍚庡彴鏍囩鍒囨崲
    const adminTabs = document.querySelector('.admin-tabs');
    if (adminTabs) {
      adminTabs.addEventListener('click', (e) => {
        if (e.target.classList.contains('admin-tab')) {
          this.switchAdminTab(e.target.dataset.tab);
        }
      });
    }
  },

  // ---- API 璋冪敤 ----
  async api(method, path, body) {
    const headers = { 'Content-Type': 'application/json' };
    if (this.token) headers['Authorization'] = 'Bearer ' + this.token;

    const opts = { method, headers };
    if (body && method !== 'GET') opts.body = JSON.stringify(body);

    const res = await fetch(path, opts);
    const data = await res.json();

    if (!res.ok) {
      if (res.status === 401) { this.logout(); throw new Error('璇峰厛鐧诲綍'); }
      throw new Error(data.error || '璇锋眰澶辫触');
    }
    return data;
  },

  // ---- 璁よ瘉 ----

  // 鍙戦€侀獙璇佺爜
  async sendCode() {
    if (this.codeCountdown > 0) return;

    const email = this.loginType === 'email' ? document.getElementById('inputEmail').value.trim() : '';
    const phone = this.loginType === 'phone' ? document.getElementById('inputPhone').value.trim() : '';

    if (!email && !phone) return this.toast('璇峰厛杈撳叆' + (this.loginType === 'email' ? '閭' : '鎵嬫満鍙?), 'error');
    if (this.loginType === 'email' && !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) return this.toast('閭鏍煎紡涓嶆纭?, 'error');
    if (this.loginType === 'phone' && !/^1[3-9]\d{9}$/.test(phone)) return this.toast('鎵嬫満鍙锋牸寮忎笉姝ｇ‘', 'error');

    try {
      const btn = document.getElementById('btnSendCode');
      btn.disabled = true;
      btn.textContent = '鍙戦€佷腑...';

      const body = {};
      if (this.loginType === 'email') body.email = email;
      else body.phone = phone;

      const data = await this.api('POST', '/api/send-code', body);

      if (data.fallback && data.code) {
        // 鑷姩濉叆楠岃瘉鐮?+ 椤甸潰鏄剧ず
        document.getElementById('inputVerifyCode').value = data.code;
        const hint = document.getElementById('codeHint');
        hint.textContent = '鍥犻偖浠舵棤娉曞彂閫侊紝楠岃瘉鐮佸凡鑷姩濉叆: ' + data.code;
        hint.style.display = 'block';
        this.toast('楠岃瘉鐮佸凡鑷姩濉叆: ' + data.code, 'info', 8000);
      } else {
        this.toast('楠岃瘉鐮佸凡鍙戦€佽嚦鎮ㄧ殑' + (this.loginType === 'email' ? '閭' : '鎵嬫満鍙?) + '锛岃娉ㄦ剰鏌ユ敹', 'success');
      }

      // 60绉掑€掕鏃?      this.codeCountdown = 60;
      btn.textContent = this.codeCountdown + 's';
      this.codeTimer = setInterval(() => {
        this.codeCountdown--;
        if (this.codeCountdown <= 0) {
          clearInterval(this.codeTimer);
          btn.disabled = false;
          btn.textContent = '鍙戦€侀獙璇佺爜';
        } else {
          btn.textContent = this.codeCountdown + 's';
        }
      }, 1000);
    } catch (e) {
      document.getElementById('btnSendCode').disabled = false;
      document.getElementById('btnSendCode').textContent = '鍙戦€侀獙璇佺爜';
      this.toast(e.message, 'error');
    }
  },

  clearCodeTimer() {
    if (this.codeTimer) { clearInterval(this.codeTimer); this.codeTimer = null; }
    this.codeCountdown = 0;
  },

  // 鐧诲綍/娉ㄥ唽
  async handleAuth() {
    const password = document.getElementById('inputPassword').value.trim();
    if (!password || password.length < 6) return this.toast('瀵嗙爜鑷冲皯6浣?, 'error');

    if (this.isRegisterMode) {
      const email = document.getElementById('inputEmail').value.trim();
      const phone = document.getElementById('inputPhone').value.trim();
      const nickname = document.getElementById('inputNickname').value.trim();
      const confirmPwd = document.getElementById('inputConfirmPwd').value.trim();

      if (!nickname) return this.toast('璇疯緭鍏ユ樀绉?, 'error');
      if (this.loginType === 'email' && !email) return this.toast('璇疯緭鍏ラ偖绠?, 'error');
      if (this.loginType === 'phone' && !phone) return this.toast('璇疯緭鍏ユ墜鏈哄彿', 'error');
      if (password !== confirmPwd) return this.toast('涓ゆ瀵嗙爜涓嶄竴鑷?, 'error');

      const verifyCode = document.getElementById('inputVerifyCode').value.trim();
      if (!verifyCode) return this.toast('璇疯緭鍏ラ獙璇佺爜', 'error');
      if (verifyCode.length !== 6) return this.toast('楠岃瘉鐮佷负6浣嶆暟瀛?, 'error');
    } else {
      const account = this.loginType === 'email'
        ? document.getElementById('inputEmail').value.trim()
        : document.getElementById('inputPhone').value.trim();
      if (!account) return this.toast('璇疯緭鍏? + (this.loginType === 'email' ? '閭' : '鎵嬫満鍙?), 'error');
    }

    try {
      const btn = document.getElementById('btnSubmitAuth');
      btn.disabled = true;
      btn.textContent = '澶勭悊涓?..';

      if (this.isRegisterMode) {
        const body = {
          password,
          nickname: document.getElementById('inputNickname').value.trim()
        };
        if (this.loginType === 'email') body.email = document.getElementById('inputEmail').value.trim();
        else body.phone = document.getElementById('inputPhone').value.trim();
        body.verifyCode = document.getElementById('inputVerifyCode').value.trim();

        const data = await this.api('POST', '/api/register', body);
        this.token = data.token;
        this.user = data.user;
        localStorage.setItem('genfun_token', this.token);
        localStorage.setItem('genfun_user', JSON.stringify(this.user));
        this.updateAuthUI();
        this.toast('娉ㄥ唽鎴愬姛锛佹杩?' + data.user.nickname, 'success');
        this.navigate('home');
      } else {
        const account = this.loginType === 'email'
          ? document.getElementById('inputEmail').value.trim()
          : document.getElementById('inputPhone').value.trim();

        const data = await this.api('POST', '/api/login', { account, password });
        this.token = data.token;
        this.user = data.user;
        localStorage.setItem('genfun_token', this.token);
        localStorage.setItem('genfun_user', JSON.stringify(this.user));
        this.updateAuthUI();
        this.toast('鐧诲綍鎴愬姛锛佹杩庡洖鏉ワ紝' + data.user.nickname, 'success');
        this.navigate('home');
      }
    } catch (e) {
      this.toast(e.message, 'error');
    } finally {
      const btn = document.getElementById('btnSubmitAuth');
      btn.disabled = false;
      btn.textContent = this.isRegisterMode ? '娉ㄥ唽' : '鐧诲綍';
    }
  },

  toggleAuthMode() {
    this.isRegisterMode = !this.isRegisterMode;
    document.getElementById('formTitle').textContent = this.isRegisterMode ? '娉ㄥ唽 GENFUN璁哄潧' : '鐧诲綍 GENFUN璁哄潧';
    document.getElementById('groupNickname').style.display = this.isRegisterMode ? '' : 'none';
    document.getElementById('groupConfirmPwd').style.display = this.isRegisterMode ? '' : 'none';
    document.getElementById('groupVerifyCode').style.display = this.isRegisterMode ? '' : 'none';
    document.getElementById('btnSubmitAuth').textContent = this.isRegisterMode ? '娉ㄥ唽' : '鐧诲綍';
    document.getElementById('switchText').textContent = this.isRegisterMode ? '宸叉湁璐﹀彿锛? : '杩樻病鏈夎处鍙凤紵';
    document.getElementById('switchLink').textContent = this.isRegisterMode ? '绔嬪嵆鐧诲綍' : '绔嬪嵆娉ㄥ唽';
    // 鍒囨崲妯″紡鏃舵竻闄ら獙璇佺爜鍜岃鏃跺櫒
    document.getElementById('inputVerifyCode').value = '';
    this.clearCodeTimer();
  },

  resetAuthForm() {
    this.isRegisterMode = false;
    document.getElementById('formTitle').textContent = '鐧诲綍 GENFUN璁哄潧';
    document.getElementById('groupNickname').style.display = 'none';
    document.getElementById('groupConfirmPwd').style.display = 'none';
    document.getElementById('groupVerifyCode').style.display = 'none';
    document.getElementById('btnSubmitAuth').textContent = '鐧诲綍';
    document.getElementById('switchText').textContent = '杩樻病鏈夎处鍙凤紵';
    document.getElementById('switchLink').textContent = '绔嬪嵆娉ㄥ唽';
    document.getElementById('inputEmail').value = '';
    document.getElementById('inputPhone').value = '';
    document.getElementById('inputPassword').value = '';
    document.getElementById('inputNickname').value = '';
    document.getElementById('inputConfirmPwd').value = '';
    document.getElementById('inputVerifyCode').value = '';
    this.clearCodeTimer();
    this.updateLoginTypeUI();
  },

  updateLoginTypeUI() {
    document.getElementById('groupEmail').style.display = this.loginType === 'email' ? '' : 'none';
    document.getElementById('groupPhone').style.display = this.loginType === 'phone' ? '' : 'none';
  },

  logout() {
    if (this.token) {
      fetch('/api/logout', {
        method: 'POST',
        headers: { 'Authorization': 'Bearer ' + this.token, 'Content-Type': 'application/json' }
      }).catch(() => {});
    }
    this.token = '';
    this.user = null;
    localStorage.removeItem('genfun_token');
    localStorage.removeItem('genfun_user');
    this.updateAuthUI();
    this.navigate('home');
    this.toast('宸查€€鍑虹櫥褰?, 'info');
  },

  // ---- 绠＄悊鍛樺姛鑳?----
  adminTab: 'dashboard',
  selectedPosts: new Set(),

  switchAdminTab(tab) {
    this.adminTab = tab;
    document.querySelectorAll('.admin-tab').forEach(t => t.classList.toggle('active', t.dataset.tab === tab));
    document.querySelectorAll('.admin-panel').forEach(p => p.classList.toggle('active', p.id === 'admin-panel-' + tab));
    if (tab === 'dashboard') this.loadDashboard();
    else if (tab === 'posts') this.loadAdminPosts();
    else if (tab === 'users') this.loadAdminUsers();
    else if (tab === 'settings') this.loadSettings();
  },

  async loadDashboard() {
    const grid = document.getElementById('statsGrid');
    grid.innerHTML = '<div class="loading">鍔犺浇涓?..</div>';
    try {
      const data = await this.api('GET', '/api/admin/stats');
      const s = data.stats;
      grid.innerHTML = [
        { icon: '馃懃', value: s.users, label: '娉ㄥ唽鐢ㄦ埛' },
        { icon: '馃摑', value: s.posts, label: '甯栧瓙鎬绘暟' },
        { icon: '馃挰', value: s.replies, label: '鍥炲鎬绘暟' },
        { icon: '馃憗', value: s.views, label: '鎬绘祻瑙堥噺' },
        { icon: '馃搸', value: s.attachments, label: '闄勪欢鎬绘暟' },
        { icon: '馃洝', value: s.admins, label: '绠＄悊鍛? },
        { icon: '馃毇', value: s.banned, label: '琚皝绂? },
        { icon: '馃啎', value: s.todayPosts, label: '浠婃棩鏂板笘' },
      ].map(c => '<div class="stat-card"><div class="stat-icon">' + c.icon + '</div><div class="stat-value">' + c.value + '</div><div class="stat-label">' + c.label + '</div></div>').join('');
    } catch (e) { grid.innerHTML = '<p style="color:var(--danger);">鍔犺浇澶辫触</p>'; }
  },

  async loadAdminPosts() {
    const container = document.getElementById('adminPostList');
    const countEl = document.getElementById('adminPostCount');
    const btn = document.getElementById('btnBatchDelete');
    container.innerHTML = '<div class="loading">鍔犺浇涓?..</div>';
    this.selectedPosts.clear();
    btn.disabled = true;
    try {
      const data = await this.api('GET', '/api/admin/posts');
      countEl.textContent = '鍏?' + data.posts.length + ' 绡?;
      if (!data.posts.length) { container.innerHTML = '<p style="color:var(--text-secondary);">鏆傛棤甯栧瓙</p>'; return; }
      container.innerHTML = data.posts.map(p => {
        const pinnedClass = p.pinned ? ' pinned' : '';
        return '<div class="admin-post-item' + pinnedClass + '">' +
          '<input type="checkbox" class="admin-post-check" value="' + p.id + '" onchange="App.togglePostSelect(\'' + p.id + '\')">' +
          '<div class="admin-post-info">' +
            '<div class="admin-post-title">' + (p.pinned ? '馃搶 ' : '') + p.title + '</div>' +
            '<div class="admin-post-meta">' +
              '<span>' + p.author.nickname + '</span>' +
              '<span>' + (p.category || '鏈垎绫?) + '</span>' +
              '<span>' + p.views + ' 娴忚</span>' +
              '<span>' + p.replyCount + ' 鍥炲</span>' +
              '<span>' + (p.updatedAt || p.createdAt).slice(0, 16).replace('T', ' ') + '</span>' +
            '</div>' +
          '</div>' +
          '<div class="admin-post-actions">' +
            '<button class="admin-action-btn' + (p.pinned ? ' pin-active' : '') + '" onclick="App.togglePin(\'' + p.id + '\')">' + (p.pinned ? '鍙栨秷缃《' : '馃搶 缃《') + '</button>' +
            '<button class="admin-action-btn danger" onclick="App.deletePostAdmin(\'' + p.id + '\')">馃棏 鍒犻櫎</button>' +
          '</div>' +
        '</div>';
      }).join('');
    } catch (e) { container.innerHTML = '<p style="color:var(--danger);">鍔犺浇澶辫触: ' + e.message + '</p>'; }
  },

  togglePostSelect(id) {

        html += `<button class="page-btn ${i === data.page ? 'active' : ''}" onclick="App.goPage(${i})">${i}</button>`;

        html += `<span class="page-info">...</span>`;

    html += `<button class="page-btn" onclick="App.goPage(${data.page + 1})" ${data.page >= data.totalPages ? 'disabled' : ''}>涓嬩竴椤?/button>`;

    container.innerHTML = html;

  renderFileList() {
    const container = document.getElementById('fileList');
    if (this.selectedFiles.length === 0) { container.innerHTML = ''; return; }
    container.innerHTML = this.selectedFiles.map((f, i) => `
      <div class="file-item">

  async uploadAllFiles() {
    const progressEl = document.getElementById('uploadProgress');
    const fillEl = document.getElementById('progressFill');
    const textEl = document.getElementById('progressText');
    const percentEl = document.getElementById('progressPercent');
    progressEl.classList.add('show');

    this.uploadedFiles = [];

    for (let i = 0; i < this.selectedFiles.length; i++) {
      const file = this.selectedFiles[i];
      textEl.textContent = `涓婁紶涓?(${i + 1}/${this.selectedFiles.length}): ${file.name}`;
      percentEl.textContent = '0%';
      fillEl.style.width = '0%';

      // 澶ф枃浠讹紙>100MB锛変娇鐢ㄥ垎鍧椾笂浼?      if (file.size > 100 * 1024 * 1024) {
        const result = await this.uploadFileChunked(file, (progress) => {
          fillEl.style.width = progress + '%';
          percentEl.textContent = Math.round(progress) + '%';
        });
        this.uploadedFiles.push(result);
      } else {
        const result = await this.uploadFileSingle(file, (progress) => {
          fillEl.style.width = progress + '%';
          percentEl.textContent = Math.round(progress) + '%';
        });
        this.uploadedFiles.push(result);
      }
    }

    textEl.textContent = `涓婁紶瀹屾垚 (${this.selectedFiles.length} 涓枃浠?`;
    percentEl.textContent = '100%';
    fillEl.style.width = '100%';
  },

  uploadFileSingle(file, onProgress) {
    return new Promise((resolve, reject) => {
      const formData = new FormData();
      formData.append('file', file);

      const xhr = new XMLHttpRequest();
      xhr.open('POST', '/api/upload');
      xhr.setRequestHeader('Authorization', 'Bearer ' + this.token);

      xhr.upload.onprogress = (e) => {
        if (e.lengthComputable) onProgress((e.loaded / e.total) * 100);
      };

      xhr.onload = () => {
        if (xhr.status === 200) resolve(JSON.parse(xhr.responseText).file);
        else {
          try { reject(new Error(JSON.parse(xhr.responseText).error)); }
          catch { reject(new Error('涓婁紶澶辫触')); }
        }
      };

      xhr.onerror = () => reject(new Error('缃戠粶閿欒'));
      xhr.send(formData);
    });
  },

  async uploadFileChunked(file, onProgress) {
    const CHUNK_SIZE = 5 * 1024 * 1024; // 5MB per chunk
    const totalChunks = Math.ceil(file.size / CHUNK_SIZE);
    const fileId = crypto.randomUUID ? crypto.randomUUID() : Date.now().toString(36) + Math.random().toString(36);

    for (let i = 0; i < totalChunks; i++) {
      const start = i * CHUNK_SIZE;
      const end = Math.min(start + CHUNK_SIZE, file.size);
      const chunk = file.slice(start, end);

      const formData = new FormData();
      formData.append('chunk', chunk);
      formData.append('fileId', fileId);
      formData.append('chunkIndex', i);
      formData.append('totalChunks', totalChunks);
      formData.append('fileName', file.name);

      await new Promise((resolve, reject) => {
        const xhr = new XMLHttpRequest();
        xhr.open('POST', '/api/upload/chunk');
        xhr.setRequestHeader('Authorization', 'Bearer ' + this.token);
        xhr.onload = () => {
          if (xhr.status === 200) resolve();
          else reject(new Error('鍒嗗潡涓婁紶澶辫触'));
        };
        xhr.onerror = () => reject(new Error('缃戠粶閿欒'));
        xhr.send(formData);
      });

      onProgress(((i + 1) / totalChunks) * 100);
    }

    // 鍚堝苟鍒嗗潡
    const res = await this.api('POST', '/api/upload/complete', { fileId, fileName: file.name });
    return res.file;
  },

  // ---- 宸ュ叿鍑芥暟 ----
  escape(text) {
    if (!text) return '';
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
  },

  timeAgo(dateStr) {
    const diff = Date.now() - new Date(dateStr).getTime();
    const sec = Math.floor(diff / 1000);
    if (sec < 60) return '鍒氬垰';
    if (sec < 3600) return Math.floor(sec / 60) + ' 鍒嗛挓鍓?;
    if (sec < 86400) return Math.floor(sec / 3600) + ' 灏忔椂鍓?;
    if (sec < 2592000) return Math.floor(sec / 86400) + ' 澶╁墠';
    return new Date(dateStr).toLocaleDateString('zh-CN');
  },

  fmtSize(bytes) {
    if (!bytes) return '0 B';
    if (bytes >= 1073741824) return (bytes / 1073741824).toFixed(2) + ' GB';
    if (bytes >= 1048576) return (bytes / 1048576).toFixed(2) + ' MB';
    if (bytes >= 1024) return (bytes / 1024).toFixed(2) + ' KB';
    return bytes + ' B';
  },

  avatarIcon(author) {
    const initial = (author.nickname || '?')[0].toUpperCase();
    return `<span style="display:inline-flex;align-items:center;justify-content:center;width:24px;height:24px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--accent-alt));color:#fff;font-size:11px;font-weight:700;flex-shrink:0;vertical-align:middle;">${initial}</span>`;
  },

      const data = await this.api('GET', '/api/user/' + userId + '/profile');
      const u = data.user;
      const isSelf = this.user && this.user.id === userId;
      let followBtn = '';
      if (this.user && !isSelf) {
        followBtn = '<button class="follow-btn follow" id="profileFollowBtn" onclick="App.toggleFollow(\'' + userId + '\')">+ 鍏虫敞</button>';
      }
      container.innerHTML = 
        '<div class="user-profile-header">' +
          '<div class="user-profile-avatar">' + (u.nickname || '?')[0].toUpperCase() + '</div>' +
          '<div class="user-profile-info">' +
            '<div class="user-profile-name">' + u.nickname + (u.role === 'admin' ? '<span class="user-profile-role">绠＄悊鍛?/span>' : '') + '</div>' +
            '<div class="user-profile-stats">' +
              '<div class="user-profile-stat" onclick="App.viewUserList(\'following\',\'' + userId + '\')"><div class="stat-num">' + data.following + '</div><div class="stat-label">鍏虫敞</div></div>' +
              '<div class="user-profile-stat" onclick="App.viewUserList(\'fans\',\'' + userId + '\')"><div class="stat-num">' + data.fans + '</div><div class="stat-label">绮変笣</div></div>' +
              '<div class="user-profile-stat"><div class="stat-num">' + data.postCount + '</div><div class="stat-label">甯栧瓙</div></div>' +
            '</div>' +
          '</div>' +
          '<div class="user-profile-actions">' + followBtn + '</div>' +
        '</div>';
      // 寮傛妫€鏌ュ叧娉ㄧ姸鎬?      if (this.user && !isSelf) {
        this.checkFollowing(userId);
      }
    } catch (e) { container.innerHTML = '<p style="color:var(--danger);text-align:center;margin-top:40px;">鍔犺浇澶辫触: ' + e.message + '</p>'; }
  },

  async checkFollowing(userId) {
    try {
      const data = await this.api('GET', '/api/follow/' + userId);
      const btn = document.getElementById('profileFollowBtn');
      if (btn && data.following) {
        btn.textContent = '鉁?宸插叧娉?;
        btn.className = 'follow-btn unfollow';
      }
    } catch (e) { /* ignore */ }
  },

  async toggleFollow(userId) {
    if (!this.user) { this.toast('璇峰厛鐧诲綍', 'error'); return; }
    try {
      const data = await this.api('POST', '/api/follow', { targetId: userId });
      const btn = document.getElementById('profileFollowBtn');
      if (data.following) {
        if (btn) { btn.textContent = '鉁?宸插叧娉?; btn.className = 'follow-btn unfollow'; }
        this.toast('宸插叧娉?, 'success');
      } else {
        if (btn) { btn.textContent = '+ 鍏虫敞'; btn.className = 'follow-btn follow'; }
        this.toast('宸插彇娑堝叧娉?, 'info');
      }
    } catch (e) { this.toast(e.message, 'error'); }
  },

  async loadUserList(type, userId) {
    const titleEl = document.getElementById('userlistTitle');
    const container = document.getElementById('userListContent');
    titleEl.textContent = type === 'fans' ? '绮変笣鍒楄〃' : '鍏虫敞鍒楄〃';
    container.innerHTML = '<div class="loading">鍔犺浇涓?..</div>';
    try {
      const data = await this.api('GET', '/api/user/' + userId + '/' + type);
      if (!data.list.length) {
        container.innerHTML = '<p style="color:var(--text-secondary);padding:20px;text-align:center;">鏆傛棤鏁版嵁</p>';
        return;
      }
      container.innerHTML = data.list.map(u =>
        '<div class="user-list-item" onclick="App.viewUserProfile(\'' + u.id + '\')">' +
          '<div class="user-list-avatar">' + (u.nickname || '?')[0].toUpperCase() + '</div>' +
          '<div><div class="user-list-name">' + u.nickname + (u.role === 'admin' ? '<span class="user-list-role">绠＄悊</span>' : '') + '</div></div>' +
        '</div>'
      ).join('');
    } catch (e) { container.innerHTML = '<p style="color:var(--danger);">鍔犺浇澶辫触</p>'; }
  },

  viewUserList(type, userId) {
    this.viewingUserId = userId;
    this.navigate('userlist', { type, userId });
  },

  viewUserProfile(userId) {
    this.navigate('profile', { userId });
  },

  toast(message, type, duration) {
    const container = document.getElementById('toast-container');
    const toast = document.createElement('div');
    toast.className = 'toast toast-' + type;
    const icons = { success: '鉁?, error: '鉁?, info: '鈩? };
    toast.innerHTML = `<strong>${icons[type] || ''}</strong> ${message}`;
    container.appendChild(toast);
    setTimeout(() => { toast.style.opacity = '0'; toast.style.transition = 'opacity 0.3s'; setTimeout(() => toast.remove(), 300); }, duration || 3500);
  }
};

// 鍚姩搴旂敤
document.addEventListener('DOMContentLoaded', () => App.init());
</script>
</body>
</html>
